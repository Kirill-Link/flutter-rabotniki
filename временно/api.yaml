      tags:
      - logout
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogOutRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LogOutRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LogOutRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '205':
          description: Logout successfully
        '400':
          description: Invalid token / already blacklisted / no refresh in body
  /api/notifications/fcm-token/:
    post:
      operationId: notifications_fcm_token_create
      description: |-
        Регистрация FCM токена устройства.
        Привязывается к аутентифицированному пользователю (User или Patient).

        POST body:
            {
                "token": "...",
                "device_id": "abc123",
                "device_type": "android"  // android | apple | web | unknown
            }
      tags:
      - notifications
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
    delete:
      operationId: notifications_fcm_token_destroy
      description: Деактивация токена при logout.
      tags:
      - notifications
      security:
      - jwtAuth: []
      - {}
      responses:
        '204':
          description: No response body
  /api/notifications/send/:
    post:
      operationId: notifications_send_create
      description: |-
        Ручная отправка уведомлений.
        Доступ: только is_staff (врачи / администраторы).

        POST body (примеры):

        1) Всем:
            {"title": "...", "body": "...", "broadcast": true}

        2) Конкретным пациентам:
            {"title": "...", "body": "...", "patient_ids": [1, 2, 3]}

        3) Конкретным юзерам:
            {"title": "...", "body": "...", "user_ids": [10, 11]}
      tags:
      - notifications
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
