components:
  schemas:
    CapSystemOption:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        code:
          type: string
          maxLength: 50
        name:
          type: string
          maxLength: 100
        order:
          type: integer
          maximum: 2147483647
          minimum: 0
      required:
      - code
      - id
      - name
    ChangePasswordRequest:
      type: object
      properties:
        old_password:
          type: string
          minLength: 1
        new_password:
          type: string
          minLength: 1
      required:
      - new_password
      - old_password
    CustomTokenObtainPairRequest:
      type: object
      properties:
        username:
          type: string
          writeOnly: true
          minLength: 1
        password:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - password
      - username
    Document:
      type: object
      properties:
        title:
          type: string
          title: Название файла
          maxLength: 30
        file:
          type: string
          format: uri
      required:
      - file
      - title
    LogOutRequest:
      type: object
      properties:
        refresh:
          type: string
          minLength: 1
      required:
      - refresh
    MarkReportReadRequestRequest:
      type: object
      properties:
        visit_id:
          type: integer
      required:
      - visit_id
    MarkReportReadResponse:
      type: object
      properties:
        status:
          type: string
      required:
      - status
    MarkTasksReadResponse:
      type: object
      properties:
        status:
          type: string
      required:
      - status
    MarkVisitNotificationReadRequestRequest:
      type: object
      properties:
        visit_id:
          type: integer
      required:
      - visit_id
    MarkVisitNotificationReadResponse:
      type: object
      properties:
        status:
          type: string
      required:
      - status
    NotificationTypeEnum:
      enum:
      - important
      - regular
      type: string
      description: |-
        * `important` - Важно
        * `regular` - Обычное
    ParentLoginRequest:
      type: object
      properties:
        phone:
          type: string
          minLength: 1
        password:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - password
      - phone
    ParentLoginResponse:
      type: object
      properties:
        parent_name:
          type: string
        children:
          type: array
          items:
            type: object
            additionalProperties: {}
      required:
      - children
      - parent_name
    ParentMarkTasksReadResponse:
      type: object
      properties:
        status:
          type: string
      required:
      - status
    ParentShort:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        first_name:
          type: string
          title: Имя
          maxLength: 100
        last_name:
          type: string
          title: Фамилия
          maxLength: 100
        middle_name:
          type: string
          title: Отчество
          maxLength: 100
        phone:
          type: string
          title: Телефон (Логин)
          maxLength: 20
        email:
          type: string
          format: email
          maxLength: 254
      required:
      - first_name
      - id
      - last_name
      - phone
    ParentShortRequest:
      type: object
      properties:
        first_name:
          type: string
          minLength: 1
