openapi: 3.0.3
info:
  title: api
  version: 1.0.0
  description: project API
paths:
  /api/change_password:
    post:
      operationId: change_password_create
      tags:
      - change_password
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          description: Password successfully changed
        '400':
          description: Old password and new password are required/ Old password is
            incorrect/ New password is the same as old password
        '401':
          description: Unauthorized
  /api/game/alerts/:
